<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBatis-Flex Code Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 20px;
            padding-bottom: 20px;
        }
        .code-container {
            position: relative;
            margin-bottom: 15px;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f5f5f5;
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
        }
        .code-content {
            border: 1px solid #ddd;
            border-radius: 0 0 4px 4px;
            max-height: 400px;
            overflow-y: auto;
        }
        pre {
            margin: 0;
            padding: 10px;
        }
        .copy-btn, .download-btn {
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 5px;
        }
        .nav-tabs {
            margin-bottom: 15px;
        }
        .tab-content {
            border: 1px solid #ddd;
            border-top: none;
            padding: 15px;
            border-radius: 0 0 4px 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">MyBatis-Flex Code Generator</h1>
        
        <div class="row">
            <div class="col-md-12">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>SQL Input</h5>
                    </div>
                    <div class="card-body">
                        <form id="codegenForm">
                            <div class="mb-3">
                                <label for="sqlScript" class="form-label">SQL CREATE Statement(s)</label>
                                <textarea class="form-control" id="sqlScript" rows="8" placeholder="Enter your CREATE TABLE SQL statements here..."></textarea>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="packageName" class="form-label">Package Name</label>
                                        <input type="text" class="form-control" id="packageName" value="com.example">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="moduleName" class="form-label">Module Name</label>
                                        <input type="text" class="form-control" id="moduleName" value="system">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-3">
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" id="useLombok" checked>
                                        <label class="form-check-label" for="useLombok">Use Lombok</label>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" id="generateMapper" checked>
                                        <label class="form-check-label" for="generateMapper">Generate Mapper</label>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" id="generateService" checked>
                                        <label class="form-check-label" for="generateService">Generate Service</label>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" id="generateController" checked>
                                        <label class="form-check-label" for="generateController">Generate Controller</label>
                                    </div>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">Generate Code</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="resultContainer" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0">Generated Code</h3>
                <button id="downloadAllBtn" class="btn btn-primary">
                    <i class="bi bi-file-earmark-zip"></i> Download All Files
                </button>
            </div>
            
            <div id="tablesTabs">
                <ul class="nav nav-tabs" id="tablesTabList" role="tablist"></ul>
                <div class="tab-content" id="tablesTabContent"></div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const codegenForm = document.getElementById('codegenForm');
            const resultContainer = document.getElementById('resultContainer');
            const tablesTabList = document.getElementById('tablesTabList');
            const tablesTabContent = document.getElementById('tablesTabContent');
            
            codegenForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const request = {
                    sqlScript: document.getElementById('sqlScript').value,
                    packageName: document.getElementById('packageName').value,
                    moduleName: document.getElementById('moduleName').value,
                    useLombok: document.getElementById('useLombok').checked,
                    generateMapper: document.getElementById('generateMapper').checked,
                    generateService: document.getElementById('generateService').checked,
                    generateController: document.getElementById('generateController').checked
                };
                
                fetch('/api/codegen/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(request)
                })
                .then(response => response.json())
                .then(data => {
                    // Check if the response is successful
                    if (data.code !== 200) {
                        throw new Error(data.message || 'Failed to generate code');
                    }
                    
                    // Clear previous results
                    tablesTabList.innerHTML = '';
                    tablesTabContent.innerHTML = '';
                    
                    // Create tabs for each table
                    data.data.tables.forEach((table, index) => {
                        // Create tab
                        const tabId = `table-${index}`;
                        const tabItem = document.createElement('li');
                        tabItem.className = 'nav-item';
                        tabItem.innerHTML = `
                            <button class="nav-link ${index === 0 ? 'active' : ''}" 
                                    id="${tabId}-tab" 
                                    data-bs-toggle="tab" 
                                    data-bs-target="#${tabId}" 
                                    type="button" 
                                    role="tab" 
                                    aria-controls="${tabId}" 
                                    aria-selected="${index === 0 ? 'true' : 'false'}">
                                ${table.className}
                            </button>
                        `;
                        tablesTabList.appendChild(tabItem);
                        
                        // Create tab content
                        const tabContent = document.createElement('div');
                        tabContent.className = `tab-pane fade ${index === 0 ? 'show active' : ''}`;
                        tabContent.id = tabId;
                        tabContent.setAttribute('role', 'tabpanel');
                        tabContent.setAttribute('aria-labelledby', `${tabId}-tab`);
                        
                        // Add download table button
                        const downloadTableBtn = document.createElement('button');
                        downloadTableBtn.className = 'btn btn-outline-primary mb-3 download-table-btn';
                        downloadTableBtn.innerHTML = '<i class="bi bi-file-earmark-zip"></i> Download All Files for ' + table.className;
                        downloadTableBtn.setAttribute('data-table-index', index);
                        tabContent.appendChild(downloadTableBtn);
                        
                        // Add code blocks for each generated file
                        Object.entries(table.generatedFiles).forEach(([fileName, code]) => {
                            const codeContainer = document.createElement('div');
                            codeContainer.className = 'code-container';
                            
                            const codeHeader = document.createElement('div');
                            codeHeader.className = 'code-header';
                            codeHeader.innerHTML = `
                                <span>${table.className}${fileName}</span>
                                <div class="btn-group">
                                    <button class="btn btn-sm btn-outline-secondary copy-btn" 
                                            data-code="${encodeURIComponent(code)}">
                                        <i class="bi bi-clipboard"></i> Copy
                                    </button>
                                    <button class="btn btn-sm btn-outline-primary download-btn" 
                                            data-code="${encodeURIComponent(code)}"
                                            data-filename="${table.className}${fileName}">
                                        <i class="bi bi-download"></i> Download
                                    </button>
                                </div>
                            `;
                            
                            const codeContent = document.createElement('div');
                            codeContent.className = 'code-content';
                            codeContent.innerHTML = `
                                <pre><code class="language-java">${escapeHtml(code)}</code></pre>
                            `;
                            
                            codeContainer.appendChild(codeHeader);
                            codeContainer.appendChild(codeContent);
                            tabContent.appendChild(codeContainer);
                        });
                        
                        tablesTabContent.appendChild(tabContent);
                    });
                    
                    // Show results
                    resultContainer.classList.remove('d-none');
                    
                    // Initialize Prism.js for syntax highlighting
                    Prism.highlightAll();
                    
                    // Add copy functionality
                    document.querySelectorAll('.copy-btn').forEach(button => {
                        button.addEventListener('click', function() {
                            const code = decodeURIComponent(this.getAttribute('data-code'));
                            navigator.clipboard.writeText(code).then(() => {
                                const originalText = this.innerHTML;
                                this.innerHTML = '<i class="bi bi-check"></i> Copied!';
                                setTimeout(() => {
                                    this.innerHTML = originalText;
                                }, 2000);
                            });
                        });
                    });
                    
                    // Add download functionality
                    document.querySelectorAll('.download-btn').forEach(button => {
                        button.addEventListener('click', function() {
                            const code = decodeURIComponent(this.getAttribute('data-code'));
                            const filename = this.getAttribute('data-filename');
                            
                            // Create a blob with the code content
                            const blob = new Blob([code], { type: 'text/plain' });
                            
                            // Create a temporary link element
                            const link = document.createElement('a');
                            link.href = URL.createObjectURL(blob);
                            link.download = filename;
                            
                            // Append to the document, click it, and remove it
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            
                            // Clean up the URL object
                            URL.revokeObjectURL(link.href);
                            
                            // Show feedback
                            const originalText = this.innerHTML;
                            this.innerHTML = '<i class="bi bi-check"></i> Downloaded!';
                            setTimeout(() => {
                                this.innerHTML = originalText;
                            }, 2000);
                        });
                    });
                    
                    // Function to create a zip file for a specific table or all tables
                    function createZipFile(tableIndices) {
                        const zip = new JSZip();
                        
                        // If tableIndices is null, include all tables
                        const indicesToInclude = tableIndices || [...Array(data.data.tables.length).keys()];
                        
                        // Store generated files
                        indicesToInclude.forEach(index => {
                            const table = data.data.tables[index];
                            
                            // Create a folder for each table
                            const folder = zip.folder(table.className);
                            
                            // Add files to the folder
                            Object.entries(table.generatedFiles).forEach(([fileName, code]) => {
                                folder.file(fileName, code);
                            });
                        });
                        
                        return zip.generateAsync({ type: 'blob' });
                    }
                    
                    // Add download all functionality
                    document.getElementById('downloadAllBtn').addEventListener('click', function() {
                        createZipFile(null)
                            .then(function(content) {
                                // Save the zip file
                                saveAs(content, 'mybatis-flex-generated-code.zip');
                                
                                // Show feedback
                                const btn = document.getElementById('downloadAllBtn');
                                const originalText = btn.innerHTML;
                                btn.innerHTML = '<i class="bi bi-check"></i> Downloaded!';
                                setTimeout(() => {
                                    btn.innerHTML = originalText;
                                }, 2000);
                            });
                    });
                    
                    // Add download table functionality
                    document.querySelectorAll('.download-table-btn').forEach(button => {
                        button.addEventListener('click', function() {
                            const tableIndex = parseInt(this.getAttribute('data-table-index'));
                            const table = data.data.tables[tableIndex];
                            
                            createZipFile([tableIndex])
                                .then(function(content) {
                                    // Save the zip file
                                    saveAs(content, `${table.className}-generated-code.zip`);
                                    
                                    // Show feedback
                                    const originalText = button.innerHTML;
                                    button.innerHTML = '<i class="bi bi-check"></i> Downloaded!';
                                    setTimeout(() => {
                                        button.innerHTML = originalText;
                                    }, 2000);
                                });
                        });
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('An error occurred while generating code. Please check the console for details.');
                });
            });
            
            // Helper function to escape HTML
            function escapeHtml(unsafe) {
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }
        });
    </script>
</body>
</html>
